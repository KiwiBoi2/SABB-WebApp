<!-- page extends to template.html -->
{% extends "template.html" %} {% block title %} Create Post {% endblock %}

<!-- post page content -->
{% block content %} 
<h1>Make a Post</h1> 

    <form method="POST">
        <!-- blog title form -->
        <label for="title">Title</label>
        <input type="text" id="title" name="title" class="form-control" placeholder="Post title here..."/>
        <br/>
        <!-- blog content text area -->
        <textarea name="content" id="content" class="form-control" placeholder="Post content here..."></textarea> 
        <br/>
        <!-- submit button-->
        <div align="center">
        <button class="btn btn-primary" type="submit">Post</button>
        </div>
    </form>
{% endblock %}
